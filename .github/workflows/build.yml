on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build roBa Firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip3 install west==1.2.0
          west init -l config
          west update
          west zephyr-export

      - name: Build Left (roBa_L)
        run: |
          west build -s zephyr/app -b seeeduino_xiao_ble -d build/left -- -DSHIELD=roBa_L -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right (roBa_R)
        run: |
          west build -s zephyr/app -b seeeduino_xiao_ble -d build/right -- -DSHIELD=roBa_R -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roBa_firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2
